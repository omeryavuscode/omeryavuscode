<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ömer Yavuz · Mobile App Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="55%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#ffffff" opacity="0.15" />
    </pattern>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="28" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="300" rx="28" fill="url(#dots)" />

  <circle cx="240" cy="60" r="160" fill="#ffffff" opacity="0.25" filter="url(#softBlur)" />
  <circle cx="1020" cy="320" r="220" fill="#ffffff" opacity="0.18" filter="url(#softBlur)" />

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="64" y="148" font-size="54" font-weight="800" letter-spacing="-0.02em">Ömer Yavuz</text>
    <text x="64" y="190" font-size="22" font-weight="600" opacity="0.95">Mobile App Developer · React Native · Expo</text>
    <text x="64" y="222" font-size="18" font-weight="500" opacity="0.92">omeryavus.com</text>
  </g>
</svg>
