<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Banner">
  <defs>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#53b45a" />
      <stop offset="100%" stop-color="#3e9b45" />
    </linearGradient>
    <linearGradient id="gYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe95c" />
      <stop offset="100%" stop-color="#ffd43b" />
    </linearGradient>
    <linearGradient id="gBlack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f14949" />
      <stop offset="100%" stop-color="#d93636" />
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b90f2" />
      <stop offset="100%" stop-color="#1e78cf" />
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14" />
      <stop offset="60%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22" />
    </radialGradient>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.1" fill="#ffffff" opacity="0.09" />
    </pattern>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <clipPath id="round">
      <rect x="0" y="0" width="1200" height="360" rx="26" ry="26" />
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="240" height="360" fill="url(#gGreen)" />
    <rect x="240" y="0" width="240" height="360" fill="url(#gYellow)" />
    <rect x="480" y="0" width="240" height="360" fill="url(#gBlack)" />
    <rect x="720" y="0" width="240" height="360" fill="url(#gRed)" />
    <rect x="960" y="0" width="240" height="360" fill="url(#gBlue)" />

    <rect x="0" y="0" width="1200" height="360" fill="url(#dots)" />
    <rect x="0" y="0" width="1200" height="360" fill="url(#vignette)" />

    <!-- Center logo (embedded PNG) -->
    <g filter="url(#softShadow)">
      <image x="490.0" y="70.0" width="220" height="220" href="data:image/png;base64," />
    </g>

    <!-- subtle separators -->
    <rect x="239" y="0" width="2" height="360" fill="#ffffff" opacity="0.10" />
    <rect x="479" y="0" width="2" height="360" fill="#ffffff" opacity="0.08" />
    <rect x="719" y="0" width="2" height="360" fill="#ffffff" opacity="0.10" />
    <rect x="959" y="0" width="2" height="360" fill="#ffffff" opacity="0.10" />
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="25" ry="25" fill="none" stroke="#ffffff" stroke-opacity="0.14" />
</svg>
